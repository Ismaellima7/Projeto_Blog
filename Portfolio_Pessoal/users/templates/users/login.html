{% extends "meus_templates/base.html" %}

{% block content %}
<div class="container mt-5 d-flex justify-content-center">
    <div class="card shadow-sm border-0" style="max-width: 400px; width: 100%;">
        <div class="card-body">
            <h3 class="card-title text-center text-primary mb-4">🔑 Login</h3>

            <form action="{% url 'login' %}" method="post">
                {% csrf_token %}
                
                <!-- Renderiza os campos do formulário com bootstrap -->
                <div class="mb-3">
                    <label for="id_username" class="form-label">Usuário</label>
                    <input type="text" name="username" class="form-control" id="id_username" required>
                </div>
                <div class="mb-3">
                    <label for="id_password" class="form-label">Senha</label>
                    <input type="password" name="password" class="form-control" id="id_password" required>
                </div>

                <button type="submit" class="btn btn-primary w-100">Entrar</button>
                <input type="hidden" name="next" value="{% url 'index' %}">
            </form>
            
        </div>
    </div>
</div>
{% endblock content %}
