{% extends "meus_templates/base.html" %}
{% block content %}

<div class="container mt-5 pt-5">

  <!-- Título da página -->
  <h2 class="titulo-secao text-center mb-4">
    🚀 Adicionar Novo Projeto
  </h2>

  <!-- Card do formulário -->
  <div class="card shadow-sm border-0 rounded-3 mx-auto" style="max-width: 700px;">
    <div class="card-body p-4">
      <h5 class="card-title text-center text-secondary mb-4">
        Preencha os dados abaixo
      </h5>

      <form action="{% url 'novo_projeto' %}" method="post">
        {% csrf_token %}

        <!-- Campos do formulário -->
        <div class="mb-4">
          {{ form.as_p }}
        </div>

        <!-- Botões -->
        <div class="d-flex justify-content-center gap-3 mt-4">
          <a href="{% url 'projetos' %}" class="btn btn-outline-secondary px-4">
            ← Voltar
          </a>
          <button type="submit" name="submit" class="btn btn-primary px-4">
            💾 Adicionar
          </button>
        </div>
      </form>
    </div>
  </div>

</div>

{% endblock content %}
