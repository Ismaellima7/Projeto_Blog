{% extends "meus_templates/base.html" %}
{% block content %}

<div class="container mt-5 pt-5">

  <!-- Título da página -->
  <h2 class="titulo-secao text-center mb-4">
    🖊️ Editar Postagem
  </h2>

  <!-- Projeto vinculado -->
  <div class="text-center mb-4">
    <p class="text-muted">
      Vinculado ao projeto:
      <a href="{% url 'projeto' projeto.id %}" class="fw-semibold text-decoration-none text-primary">
        {{ projeto }}
      </a>
    </p>
  </div>

  <!-- Card do formulário -->
  <div class="card shadow-sm border-0 rounded-3 mx-auto" style="max-width: 700px;">
    <div class="card-body p-4">
      <h5 class="card-title text-center text-secondary mb-4">
        Atualize as informações abaixo
      </h5>

      <form action="{% url 'editar_postagem' postagem.id %}" method="post">
        {% csrf_token %}

        <!-- Campo de descrição -->
        <div class="mb-4">
          <label for="id_descricao" class="form-label fw-semibold">Descrição:</label>
          <textarea name="descricao" id="id_descricao" rows="6"
                    class="form-control shadow-sm" placeholder="Edite o conteúdo da postagem..." required>{{ form.descricao.value }}</textarea>
        </div>

        <!-- Botões -->
        <div class="d-flex justify-content-center gap-3 mt-4">
          <a href="{% url 'projeto' projeto.id %}" class="btn btn-outline-secondary px-4 d-flex align-items-center gap-1">
            <span>←</span> <span>Cancelar</span>
          </a>
          <button type="submit" name="submit" class="btn btn-success px-4 d-flex align-items-center gap-1">
            <span>💾</span> <span>Salvar</span>
          </button>
        </div>
      </form>
    </div>
  </div>

</div>

{% endblock content %}
