{% extends "meus_templates/base.html" %}
{% block content %}

<div class="container mt-5 pt-5">

  <!-- Título da página -->
  <h2 class="titulo-secao text-center mb-4 text-danger">
    🗑️ Excluir Postagem
  </h2>

  <!-- Projeto vinculado -->
  <div class="text-center mb-4">
    <p class="text-muted">
      Vinculado ao projeto:
      <a href="{% url 'projeto' projeto.id %}" class="fw-semibold text-decoration-none text-primary">
        {{ projeto }}
      </a>
    </p>
  </div>

  <!-- Card de confirmação -->
  <div class="card shadow-sm border-0 rounded-3 mx-auto" style="max-width: 700px;">
    <div class="card-body p-4 text-center">
      <h5 class="card-title text-secondary mb-3">
        Tem certeza de que deseja excluir esta postagem?
      </h5>

      <!-- Conteúdo da postagem -->
      <div class="border rounded-3 p-3 bg-light mb-4">
        <h6 class="fw-semibold mb-2">{{ postagem.titulo }}</h6>
        <p class="text-muted mb-0">{{ postagem.descricao }}</p>
      </div>

      <!-- Botões -->
      <form action="{% url 'excluir_postagem' postagem.id %}" method="post">
        {% csrf_token %}
        <div class="d-flex justify-content-center gap-3 mt-3">
          <a href="{% url 'projeto' projeto.id %}" class="btn btn-outline-secondary px-4 d-flex align-items-center gap-1">
            <span>←</span> <span>Cancelar</span>
          </a>
          <button type="submit" class="btn btn-danger px-4 d-flex align-items-center gap-1">
            <span>🗑️</span> <span>Excluir</span>
          </button>
        </div>
      </form>
    </div>
  </div>

</div>

{% endblock content %}
